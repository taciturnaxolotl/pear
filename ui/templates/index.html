{{define "index_page"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>pear: nice recipes</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <meta property="og:title" content="pear: nice recipes">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{.BaseURL}}">
  <meta property="og:image" content="{{.BaseURL}}/static/og.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="pear: nice recipes">
  <meta name="twitter:image" content="{{.BaseURL}}/static/og.png">
</head>
<body>
  <nav>
    <a href="/" class="wordmark">pear</a>
  </nav>
  <div class="page">
    <div class="hero">
      <p>paste any recipe URL below to strip it down to what matters</p>
      <div class="search-form">
        <form method="GET" action="/">
          <input type="text" name="url" placeholder="https://www.seriouseats.com/..." value="" autofocus>
          <button type="submit">pear it</button>
        </form>
      </div>
    </div>
  </div>
  <footer>
    <span>made by <a href="https://dunkirk.sh" target="_blank" rel="noopener">Kieran Klukas</a></span>
    <a href="https://tangled.org/dunkirk.sh/pear/commit/{{.GitHash}}" target="_blank" rel="noopener" class="commit-link">{{.GitHash}}</a>
  </footer>
</body>
</html>
{{end}}
